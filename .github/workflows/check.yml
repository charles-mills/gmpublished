name: check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  nix:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7

      - name: Check Nix flake
        run: nix flake check --all-systems

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify version metadata
        run: packaging/scripts/verify_version.sh

      - name: Determine validation scope
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$BASE_SHA"
          else
            base="$BEFORE_SHA"
          fi

          if ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$base" "$HEAD_SHA")"
          if [ -n "$changed_files" ] && ! printf '%s\n' "$changed_files" | grep -qvE '\.md$'; then
            echo "rust=false" >> "$GITHUB_OUTPUT"
          else
            echo "rust=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install system packages
        if: steps.scope.outputs.rust == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libasound2-dev \
            libfontconfig1-dev \
            libgl1-mesa-dev \
            libwayland-dev \
            libx11-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Restore Cargo sources
        if: steps.scope.outputs.rust == 'true'
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-sources-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-sources-${{ runner.os }}-

      - name: Configure compiler cache
        if: steps.scope.outputs.rust == 'true'
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Verify formatting
        if: steps.scope.outputs.rust == 'true'
        run: cargo fmt --all -- --check

      - name: Run workspace tests
        if: steps.scope.outputs.rust == 'true'
        run: cargo test --workspace --locked

      - name: Lint all features
        if: steps.scope.outputs.rust == 'true'
        run: cargo clippy --workspace --all-targets --all-features --locked --no-deps -- -D warnings

      - name: Check release configuration
        if: steps.scope.outputs.rust == 'true'
        run: cargo check --package gmpublished --release --locked
