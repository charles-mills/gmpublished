name = "gmpublished"
product-name = "gmpublished"
identifier = "dev.charlesmills.gmpublished"
version = "0.1.0"
description = "Native Workshop publishing and addon inspection utility for Garry's Mod."
long-description = "gmpublished is a native desktop application for publishing, updating, downloading, inspecting, and extracting Garry's Mod Workshop addons."
homepage = "https://github.com/charles-mills/gmpublished"
authors = [
    "Charles Mills <charles@charlesmills.dev>",
]
publisher = "Charles Mills"
license-file = "../LICENSE"
copyright = "Copyright © 2026 gmpublished contributors"
category = "DeveloperTool"
out-dir = "../target/packager-dev"
binaries-dir = "../target/dev-bundle"
before-packaging-command = "GMPUBLISHED_PACKAGER_PROFILE=dev-bundle sh scripts/prepare_packager_inputs.sh"
formats = ["app"]

binaries = [{ path = "gmpublished", main = true }]

icons = [
    "icons/32x32.png",
    "icons/128x128.png",
    "icons/128x128@2x.png",
    "icons/icon.icns",
    "icons/icon.ico",
]

resources = [
    { src = "macos/Credits.rtf", target = "Credits.rtf" },
]

external-binaries = ["steam/generated/libsteam_api.dylib"]

[macos]
minimum-system-version = "10.13"
info-plist-path = "macos/Info.extra.plist"
