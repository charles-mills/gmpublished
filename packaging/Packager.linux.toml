name = "gmpublished"
product-name = "gmpublished"
identifier = "dev.charlesmills.gmpublished"
version = "0.1.0"
description = "Native Workshop publishing and addon inspection utility for Garry's Mod."
long-description = "gmpublished is a native desktop application for publishing, updating, downloading, inspecting, and extracting Garry's Mod Workshop addons."
homepage = "https://github.com/charles-mills/gmpublished"
authors = [
    "Charles Mills <charles@charlesmills.dev>",
]
publisher = "Charles Mills"
license-file = "../LICENSE"
copyright = "Copyright © 2026 gmpublished contributors"
category = "DeveloperTool"
out-dir = "../target/packager"
binaries-dir = "../target/release"
before-packaging-command = "sh scripts/prepare_packager_inputs.sh"
formats = ["deb", "appimage"]

binaries = [{ path = "gmpublished", main = true }]

icons = [
    "icons/32x32.png",
    "icons/128x128.png",
    "icons/128x128@2x.png",
    "icons/icon.png",
]

[deb]
package-name = "gmpublished"
section = "utils"
priority = "optional"
desktop-template = "linux/gmpublished.desktop.hbs"
depends = [
    "libc6",
    "libasound2",
    "libgcc-s1",
    "libx11-6",
    "libxcb1",
    "libxkbcommon0",
    "libfontconfig1",
    "libgl1",
    "libwayland-client0",
]

[deb.files]
"linux/application-gma.xml" = "usr/share/mime/packages/application-gma.xml"
"steam/redistributable/linux/libsteam_api.so" = "usr/bin/libsteam_api.so"

[appimage]
libs = []
bins = []

[appimage.files]
"linux/application-gma.xml" = "usr/share/mime/packages/application-gma.xml"
"steam/redistributable/linux/libsteam_api.so" = "usr/lib/libsteam_api.so"

[pacman]
depends = [
    "hicolor-icon-theme",
    "mesa",
    "fontconfig",
    "libxkbcommon",
    "libx11",
    "libxcb",
    "wayland",
]

[pacman.files]
"linux/application-gma.xml" = "usr/share/mime/packages/application-gma.xml"
